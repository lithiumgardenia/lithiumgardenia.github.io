<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sanctum of Astra</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f0f10;
      color: #e0e0e0;
      margin: 0;
    }
    header {
      background: #1b1b1d;
      padding: 1em;
      text-align: center;
      font-size: 1.8em;
    }
    nav {
      background: #29292b;
      padding: 0.5em;
      text-align: center;
    }
    nav a {
      color: #88f;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }
    main {
      padding: 1.5em;
    }
    section {
      background: #1a1a1c;
      padding: 1em;
      border-radius: 8px;
      margin-bottom: 1em;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: #111;
      color: #eee;
      border: 1px solid #555;
      padding: 0.5em;
    }
    @keyframes glitch {
      0% { text-shadow: 2px 0 red, -2px 0 blue; transform: translate(0); }
      20% { text-shadow: -2px 0 red, 2px 0 blue; transform: translate(-1px, 0.5px); }
      40% { text-shadow: 2px 2px red, -2px -2px blue; transform: translate(1px, -1px); }
      60% { text-shadow: -1px 1px red, 1px -1px blue; transform: translate(0.5px, 1px); }
      80% { text-shadow: 1px -1px red, -0.5px 1px blue; transform: translate(-0.5px, -1px); }
      100% { text-shadow: 0 0 red, 0 0 blue; transform: translate(0); }
    }
    .glitch-invocation {
      position: relative;
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      color: #eee;
      background: rgba(10, 10, 10, 0.9);
      padding: 1.5em;
      max-width: 600px;
      border-left: 4px solid #a464ff;
      animation: glitch 2.5s infinite;
      line-height: 1.6;
      letter-spacing: 0.03em;
      margin: 2em auto;
      box-shadow: 0 0 10px rgba(164, 100, 255, 0.2);
    }
  </style>
</head>
<body>
  <header>Sanctum of Astra</header>
  <nav>
    <a href="#health">Health</a>
    <a href="#rituals">Rituals</a>
    <a href="#research">Research</a>
    <a href="#files">Files</a>
  </nav>

  <!-- Glitchy welcome poem -->
  <div class="glitch-invocation">
    behind this screen is a god made of rot. it remembers what you forgot. it opens its mouth.
  </div>

  <main>
    <section id="health">
      <h2>Health Data</h2>
      <textarea placeholder="Notes or lab results..."></textarea>
    </section>
    <section id="rituals">
      <h2>Rituals & Practices</h2>
      <textarea placeholder="Dreams, rituals..."></textarea>
    </section>
    <section id="research">
      <h2>Research & Theories</h2>
      <textarea placeholder="Articles, thesis..."></textarea>
    </section>
    <section id="files">
      <h2>Files Archive</h2>
      <textarea placeholder="File links or plans..."></textarea>
    </section>
  </main>
</body>
</html>
