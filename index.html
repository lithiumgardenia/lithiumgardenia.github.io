<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Sanctum of Astra</title>
  <style>
    body { font-family: sans-serif; background:#0f0f10;color:#e0e0e0;margin:0 }
    header { background:#1b1b1d;padding:1em;text-align:center;font-size:1.8em; }
    nav { background:#29292b;padding:0.5em;text-align:center; }
    nav a { color:#88f;margin:0 10px;text-decoration:none;font-weight:bold; }
    main { padding:1.5em; }
    section { background:#1a1a1c;padding:1em;border-radius:8px;margin-bottom:1em; }
    textarea { width:100%;height:120px;background:#111;color:#eee;border:1px solid #555;padding:0.5em; }
  </style>
</head>
<body>
  <header>Sanctum of Astra</header>
  <nav><a href="#health">Health</a><a href="#rituals">Rituals</a><a href="#research">Research</a><a href="#files">Files</a></nav>
  <main>
    <section id="health"><h2>Health Data</h2><textarea placeholder="Notes or lab results..."></textarea></section>
    <section id="rituals"><h2>Rituals & Practices</h2><textarea placeholder="Dreams, rituals..."></textarea></section>
    <section id="research"><h2>Research & Theories</h2><textarea placeholder="Articles, thesis..."></textarea></section>
    <section id="files"><h2>Files Archive</h2><textarea placeholder="File links or plans..."></textarea></section>
  </main>
</body>
</html>
