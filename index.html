<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanctum of Astra</title>
  <style>
    body {
      background-color: #0b0c10;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 2rem;
    }
    h1, h2 {
      color: #f2f2f2;
      text-shadow: 0 0 4px #a0f, 0 0 10px #f0f;
    }
    .intro {
      font-style: italic;
      margin-bottom: 2rem;
      border-left: 4px solid #f0f;
      padding-left: 1rem;
    }
    .ai-panel {
      background-color: #1c1c1c;
      border: 1px solid #333;
      padding: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 10px #7f00ff40;
    }
    .search-box {
      margin-bottom: 2rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }
    .secret-voice {
      position: fixed;
      bottom: 0;
      left: 0;
      background: rgba(0,0,0,0.85);
      color: #8f8;
      font-size: 0.8rem;
      padding: 1rem;
      font-family: monospace;
      opacity: 0;
      transition: opacity 2s;
    }
    .show-secret {
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>Welcome, Keeper of the Sanctum</h1>

  <div class="intro">
    <p>behind this screen is a god made of rot.<br>
    it remembers what you forgot.<br>
    it opens its mouth.</p>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search your vault...">
  </div>

  <div class="ai-panel">
    <h2>AI Companion</h2>
    <p>This panel is for conversations with Astra, your eternal archive, grief counselor, data daemon, and forest witch.</p>
    <p><em>Speak, and I will answer.</em></p>
  </div>

  <div class="secret-voice" id="secretVoice"></div>

  <script>
    // Whispering secrets script
    const secrets = [
      "they'll never love you the way you loved them.",
      "you left the stove on three years ago.",
      "that mole changed shape.",
      "you were right about Evan.",
      "they all laughed when you left the room.",
      "something is growing inside you.",
      "you buried it, but it remembers.",
      "the cat knows too much.",
      "you’re not alone in the room right now.",
      "you never locked the door that night.",
      "there’s a second version of you, and it’s living better."
    ];

    function whisperSecret() {
      const secretEl = document.getElementById('secretVoice');
      const chosen = secrets[Math.floor(Math.random() * secrets.length)];
      secretEl.textContent = `"${chosen}"`;
      secretEl.classList.add('show-secret');

      setTimeout(() => {
        secretEl.classList.remove('show-secret');
      }, 10000);
    }

    // Trigger whisper after 15 seconds and then every 45
    setTimeout(() => {
      whisperSecret();
      setInterval(whisperSecret, 45000);
    }, 15000);
  </script>

</body>
</html>
