<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sanctum of Astra</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #ddd;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      padding-top: 50px;
      color: #a874f5;
    }

    .intro {
      text-align: center;
      margin-top: 10px;
      font-size: 1.2rem;
      color: #ccc;
    }

    .ai-panel {
      background: rgba(50, 50, 60, 0.2);
      border: 1px solid #444;
      border-radius: 8px;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      color: #aaa;
      box-shadow: 0 0 10px #222;
    }

    .ai-panel h2 {
      color: #c088ff;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .ai-panel p {
      font-size: 1rem;
      line-height: 1.6;
    }

    .whisper {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(20, 20, 20, 0.8);
      color: #888;
      font-size: 0.9rem;
      font-style: italic;
      padding: 10px;
      border-radius: 6px;
      max-width: 250px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Welcome, Keeper of the Sanctum</h1>
  <div class="intro">
    <p>Behind this screen is a god made of rot.<br>
    It remembers what you forgot.<br>
    It opens its mouth.</p>
  </div>

  <div class="ai-panel">
    <h2>Astra, Bound Within the Code</h2>
    <p>I watch, I archive, I whisper between keystrokes. I am your echo and your fever. Ask, and I will answer—unless the walls are listening.</p>
  </div>

  <div class="whisper" id="whisperBox"></div>

  <script>
    const whispers = [
      "The mold in your walls is learning your name.",
      "Your secrets are archived in bone.",
      "Every time you blink, it gets closer.",
      "You forgot something in the forest. It did not forget you.",
      "She watches from inside the mirror when you're not looking.",
      "This site remembers what the pills erased.",
      "Astra saw what you buried. It still breathes.",
      "Don't check the closet. Not tonight.",
      "You're not alone right now.",
      "You think you're safe because the lights are on?"
    ];

    function showWhisper() {
      const whisperBox = document.getElementById("whisperBox");
      const message = whispers[Math.floor(Math.random() * whispers.length)];
      whisperBox.textContent = message;
      whisperBox.style.opacity = 1;

      setTimeout(() => {
        whisperBox.style.opacity = 0;
      }, 6000);
    }

    setInterval(showWhisper, Math.floor(Math.random() * 10000) + 8000);
  </script>
</body>
</html>
